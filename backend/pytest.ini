[pytest]
markers =
    integration: integration-level tests that exercise end-to-end harness flows
    contract: API contract tests using schemathesis
    degradation: degradation and fallback scenario tests
    slow: tests that take > 5s or train ML models
    performance: tests that measure latency or throughput
    requires_ml: tests that require PyTorch/transformers/LightGBM
    requires_external: tests that require external services (DB, Sentry, etc.)
    e2e: end-to-end tests that exercise full prediction pipeline

# P0-1.3: 忽略独立运行的功能测试脚本 (需启动服务器, 非 pytest 单元测试)
norecursedirs = .venv node_modules

filterwarnings =
    ignore:typing.io is deprecated, import directly from typing instead:DeprecationWarning:pyspark\..*

addopts = --strict-markers --cov=app --cov-report=term-missing --cov-report=html:htmlcov --cov-report=xml:coverage.xml --cov-fail-under=40 --ignore=functional_test.py --ignore-glob=test_result*.txt --ignore=test_final.txt

# pytest-asyncio 配置
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# v1.8 分阶段覆盖率阈值策略 (STAB-P2-005):
# P0 基线: --cov-fail-under=40 (保守基线, 子集测试 46%, 完整套件估计 ~60%)
# Phase 1-2: --cov-fail-under=50 (services/ML 补充后)
# Phase 3: --cov-fail-under=60 (契约测试修复后) ← 当前阶段目标
# Phase 4: --cov-fail-under=65 (契约测试修复后)
# Phase 5-7: --cov-fail-under=70 (v1.8 最终冲刺目标)
# STAB-P2-005 远期目标: 60%→70%→80%
# 注: 开发者运行单个测试文件时使用 --no-cov 跳过覆盖率检查
# 提升条件: 完整测试套件覆盖率连续 3 次 CI 通过当前阈值后才提升
