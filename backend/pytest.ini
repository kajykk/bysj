[pytest]
markers =
    integration: integration-level tests that exercise end-to-end harness flows
    contract: API contract tests using schemathesis
    degradation: degradation and fallback scenario tests
    slow: tests that take > 5s or train ML models
    performance: tests that measure latency or throughput
    requires_ml: tests that require PyTorch/transformers/LightGBM
    requires_external: tests that require external services (DB, Sentry, etc.)
    e2e: end-to-end tests that exercise full prediction pipeline

filterwarnings =
    ignore:typing.io is deprecated, import directly from typing instead:DeprecationWarning:pyspark\..*

addopts = --strict-markers --cov=app --cov-report=term-missing --cov-report=html:htmlcov --cov-report=xml:coverage.xml

# pytest-asyncio 配置
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# v1.8 分阶段覆盖率阈值策略:
# Phase 1-2: 不设置 fail-under (当前覆盖率 ~60%，目标 60%)
# Phase 3: --cov-fail-under=60 (services/ML 补充后)
# Phase 4: --cov-fail-under=65 (契约测试修复后)
# Phase 5-7: --cov-fail-under=70 (v1.8 最终冲刺目标)
