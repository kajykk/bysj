[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "W",    # pycodestyle warnings
    "I",    # isort
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "E203",  # whitespace before ':' (conflicts with formatter)
]

[tool.ruff.lint.per-file-ignores]
# E402: module level import not at top of file
# These files intentionally set env vars or pytest marks before imports
"app/__init__.py" = ["E402"]
"app/main.py" = ["E402"]
"app/core/config.py" = ["E402"]
"app/core/seed.py" = ["E402"]
"app/api/v1/observability/__init__.py" = ["E402"]
"app/api/v1/model_predict/__init__.py" = ["E402"]
"app/services/risk_service.py" = ["E402"]
"tests/*" = ["E402"]
"tests/**/*" = ["E402"]
# F401: re-exports in __init__.py files
"app/api/v1/__init__.py" = ["F401"]
"app/models/__init__.py" = ["F401"]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.format]
quote-style = "double"
