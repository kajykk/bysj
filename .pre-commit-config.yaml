# MAINT-P3-004: pre-commit 钩子配置
# 安装: pip install pre-commit && pre-commit install
# 手动运行: pre-commit run --all-files
# 跳过: git commit --no-verify (仅紧急情况)

repos:
  # ===== 基础钩子 (跨语言通用) =====
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        name: 移除行尾空格
        exclude: '\.md$'  # Markdown 允许行尾两空格作为换行
      - id: end-of-file-fixer
        name: 确保文件末尾换行
      - id: check-yaml
        name: YAML 语法检查
        args: ['--unsafe']  # 允许 !!str 等 YAML 标签
      - id: check-added-large-files
        name: 检查大文件
        args: ['--maxkb=500']  # 500KB 上限, 防止误提交二进制文件
      - id: check-merge-conflict
        name: 检查合并冲突标记
      - id: check-case-conflict
        name: 检查文件名大小写冲突 (Windows/Linux 兼容)
      - id: check-docstring-first
        name: 确保 docstring 在文件开头

  # ===== Backend: Ruff (lint + format) =====
  # MAINT-P3-003: ruff 替代 black + isort + flake8, 统一 Python 代码风格
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        name: Ruff lint (backend)
        args: ['--fix']  # 自动修复可修复的错误
        files: ^backend/app/.*\.py$
      - id: ruff-format
        name: Ruff format (backend)
        files: ^backend/app/.*\.py$

  # ===== Backend: Bandit (安全扫描) =====
  # MAINT-P3-003: bandit Medium+ 问题阻塞提交
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        name: Bandit security scan (backend)
        args: ['-c', 'backend/pyproject.toml', '-ll']
        files: ^backend/app/.*\.py$

  # ===== Frontend: ESLint + Prettier =====
  # 使用本地安装的 eslint/prettier (language: system), 避免 pre-commit 独立安装
  - repo: local
    hooks:
      - id: eslint
        name: ESLint (frontend)
        entry: bash -c 'cd frontend && npx eslint --ext .vue,.ts,.tsx,.js,.jsx'
        language: system
        files: ^frontend/src/.*\.(vue|ts|tsx|js|jsx)$
        pass_filenames: false
        types: [file]
      - id: prettier
        name: Prettier format (frontend)
        entry: bash -c 'cd frontend && npx prettier --check'
        language: system
        files: ^frontend/src/.*\.(vue|ts|tsx|js|jsx|json|css|scss)$
        pass_filenames: false
        types: [file]

# ===== 全局配置 =====
default_language_version:
  python: python3.11

# 排除目录 (不需要检查的文件)
exclude: |
  (?x)^(
      backend/alembic/.*|
      backend/tests/.*|
      backend/scripts/.*|
      frontend/dist/.*|
      frontend/node_modules/.*|
      frontend/coverage/.*|
      .trae/.*|
      docs/.*|
      uploads/.*
  )$
