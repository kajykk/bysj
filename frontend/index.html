<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#409eff" />
    <meta name="description" content="抑郁症动态预警与干预系统 - 基于多模态数据的智能风险评估平台" />
    <!-- CSP-修复：静态 CSP meta 标签，保护引导阶段（nginx 响应头作为主要防护，此为补充） -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; form-action 'self'; img-src 'self' data: blob:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https://sentry.io https://*.sentry.io" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <title>抑郁症动态预警与干预系统</title>
    <style>
      /* 首屏加载优化：内联关键 CSS */
      html, body { margin: 0; padding: 0; height: 100%; }
      #app { min-height: 100vh; }
      .loading-skeleton {
        background: linear-gradient(90deg, #f0f2f5 25%, #e4e7ed 50%, #f0f2f5 75%);
        background-size: 200% 100%;
        animation: skeleton-loading 1.5s infinite;
      }
      @keyframes skeleton-loading {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      @media (prefers-reduced-motion: reduce) {
        .loading-skeleton {
          animation: none;
          background: #f0f2f5;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- 首屏加载占位 -->
      <div class="loading-skeleton" style="position: fixed; top: 0; left: 0; right: 0; height: 4px; z-index: 9999;"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
