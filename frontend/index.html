<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2e6fa8" />
    <meta name="description" content="抑郁症动态预警与干预系统 - 基于多模态数据的智能风险评估平台" />
    <meta name="application-name" content="心理预警平台" />
    <meta name="author" content="心理预警平台团队" />
    <meta name="robots" content="index, follow" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="心理预警平台" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <!-- P1-1 性能优化：移除 Google Fonts 外部 CDN 依赖（原 52KB 请求导致 FCP 5.8s）。
         改用 variables.scss 中已配置的系统字体栈（Geist 作为首选，缺失时回退到
         -apple-system / PingFang SC / Microsoft YaHei 等系统字体）。
         消除外部请求后 FCP 预计降至 ≤1.5s，同时避免中国境内 fonts.googleapis.com 慢速问题。 -->
    <!-- M-FE-19 修复：移除静态 CSP meta 标签，避免与 nginx header 重复。
         开发环境由 csp.ts 的 applyCspMetaTag() 动态添加 meta（支持 Vite HMR），
         生产环境由 nginx CSP 响应头统一控制（见 nginx.conf）。 -->
    <title>抑郁症动态预警与干预系统</title>
    <style>
      /* 首屏加载优化：内联关键 CSS */
      /* ISS-163 修复：骨架屏颜色令牌化（此处无法引用 variables.scss，定义为局部变量并保持同步） */
      :root {
        --skeleton-base: #eef2f6;
        --skeleton-accent: #e8ecf0;
      }
      html, body { margin: 0; padding: 0; height: 100%; }
      #app { min-height: 100vh; }
      .loading-skeleton {
        background: linear-gradient(90deg, var(--skeleton-base) 25%, var(--skeleton-accent) 50%, var(--skeleton-base) 75%);
        background-size: 200% 100%;
        animation: skeleton-loading 1.5s infinite;
      }
      @keyframes skeleton-loading {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      @media (prefers-reduced-motion: reduce) {
        .loading-skeleton {
          animation: none;
          background: var(--skeleton-base);
        }
      }
    </style>
    <!-- ISS-04 修复：显式 favicon，避免浏览器自动请求 /favicon.ico 产生 404 控制台错误（该错误会拉低 Lighthouse errors-in-console） -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512x512.png" />
  </head>
  <body>
    <div id="app">
      <!-- P1-1 性能优化：首屏占位内容，浏览器立即渲染（无需等待 JS），Vue 挂载后自动替换。
           提供 LCP 可测量元素，避免 SPA 空白 HTML 导致 Lighthouse 无法评分。 -->
      <div class="app-boot-screen" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f5f7fa;font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;">
        <div style="text-align:center;color:#606266;">
          <div style="font-size:28px;font-weight:700;margin-bottom:12px;color:#2e6fa8;">心理预警平台</div>
          <div style="font-size:14px;color:#606266;">正在加载，请稍候...</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
