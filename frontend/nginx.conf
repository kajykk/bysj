# P1-INFRA-030: Nginx 配置 - SPA 路由回退 + API 反向代理 + 安全头
# SEC-P1-006 修复: 增加 443 ssl + 80→443 跳转 + TLS 优化 (HSTS 在 HTTPS 下生效)
# RES-P2-008: 启用 Brotli 压缩 (需 ngx_brotli 模块)
# 注意: load_module 指令由 Dockerfile 通过 sed 插入 /etc/nginx/nginx.conf 顶部

# 限流 zone：防止 API 暴力攻击
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
# M-FE-13 修复：auth 限流从 5r/m 放宽到 10r/m，避免正常登录被误限
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
# M-FE-13 修复：为 /auth/refresh 单独配置更高限流（20r/m），避免频繁刷新被限
limit_req_zone $binary_remote_addr zone=auth_refresh_limit:10m rate=20r/m;

# ── SEC-P1-006: HTTP 80 → HTTPS 443 永久跳转 ──
server {
    listen 80;
    server_name _;
    # 永久跳转到 HTTPS，保留原始 URI
    return 301 https://$host$request_uri;
}

# ── SEC-P1-006: HTTPS 443 主服务 (TLS + SPA + API 反代) ──
server {
    listen 443 ssl;
    http2 on;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── SEC-P1-006: TLS 证书与协议配置 ──
    # 证书路径由 docker-compose 挂载 ./infra/nginx/certs → /etc/nginx/certs
    # 开发/测试环境使用自签名证书 (scripts/generate-self-signed-cert.sh)
    # 生产环境替换为 CA 签发证书 (如 Let's Encrypt)
    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    # 仅启用 TLS 1.2 / 1.3, 禁用 SSLv3/TLSv1.0/TLSv1.1 (POODLE/BEAST 等漏洞)
    ssl_protocols TLSv1.2 TLSv1.3;
    # 密码套件: 优先 ECDHE 前向保密 + AES-GCM/CHACHA20 (Mozilla Intermediate 兼容性推荐)
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    # TLS 1.3 由客户端选择密码套件, 关闭服务端偏好避免影响 1.3
    ssl_prefer_server_ciphers off;
    # 会话缓存: 减少 TLS 握手开销 (10m ≈ 4 万个会话)
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    # 禁用会话票据 (RFC 5077), 避免前向保密被票据密钥泄露削弱
    ssl_session_tickets off;

    # gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    # M-FE-11 修复：显式设置压缩级别（1-9，默认 1），4 为压缩率与 CPU 开销的平衡点
    gzip_comp_level 4;
    # L-FE-18 修复：补充现代 MIME 类型 application/manifest+json（PWA manifest 文件）
    gzip_types text/plain text/css application/json application/javascript application/manifest+json text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # L-27 修复 + RES-P2-008: Brotli 压缩配置 (需 ngx_brotli 模块, 比 gzip 压缩率高 15-25%)
    # 模块加载: nginx.conf 顶部 load_module + Dockerfile 安装 nginx-mod-http-brotli
    brotli on;
    brotli_comp_level 6;
    brotli_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    # X-XSS-Protection 已被现代浏览器废弃，mode=block 可能引入审计漏洞，改为 0
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # HSTS：强制 HTTPS (SEC-P1-006 修复后 443 端口已启用 TLS, HSTS 现在生效)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Permissions-Policy：禁用不必要的浏览器能力
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # CSP-修复：在 HTTP 响应头层设置 CSP，保护初始 HTML 加载阶段（运行时 meta 标签作为补充）
    # 与 csp.ts 的 PROD_POLICY 保持一致，避免引导期 CSP 缺失窗口
    # M-FE-12 修复：追加 frame-ancestors 'self'，防止页面被 iframe 嵌套（点击劫持防护）
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; img-src 'self' data: blob:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https://sentry.io https://*.sentry.io" always;

    # 静态资源缓存（Vite 构建产物带 hash，可长期缓存）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA 路由回退：所有非文件请求返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理到后端（应用限流）
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # 认证端点更严格的限流
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # M-FE-13 修复：/auth/refresh 单独配置更高限流（20r/m），
    # 避免短时 token 过期触发的并发刷新被 auth_limit 限流
    location /api/v1/auth/refresh {
        limit_req zone=auth_refresh_limit burst=5 nodelay;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # C-10 修复：WebSocket 代理配置，支持实时预警推送
    # RES-P3-007: proxy_read/send_timeout 从 3600s 降为 600s (10 分钟),
    # 客户端有心跳保活 (默认 30s), 600s 足以检测僵尸连接并释放资源;
    # 3600s 过长会导致断网/崩溃的客户端连接在 nginx 侧保留 1 小时, 浪费连接表内存
    location /ws {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # 健康检查端点
    location /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
    }
}
