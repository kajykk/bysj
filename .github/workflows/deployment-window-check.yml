name: deployment-window-check

# STAB-P2-007: 部署窗口控制
# 在 push 到 main 时执行部署窗口检查, 防止在非工作时间/非窗口期部署
# 紧急部署可通过 DEPLOY_WINDOW_EMERGENCY=true 覆盖

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      emergency_override:
        description: '紧急覆盖 (跳过窗口检查)'
        required: false
        type: boolean
        default: false

jobs:
  check-deployment-window:
    name: Check Deployment Window (STAB-P2-007)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check deployment window
        # 开发期: 窗口检查记录结果但不阻塞 CI (continue-on-error)
        # 生产部署前: 移除 continue-on-error 恢复阻塞语义, 或通过 workflow_dispatch 手动触发
        continue-on-error: true
        env:
          DEPLOY_WINDOW_START: ${{ vars.DEPLOY_WINDOW_START || '09:00' }}
          DEPLOY_WINDOW_END: ${{ vars.DEPLOY_WINDOW_END || '18:00' }}
          DEPLOY_WINDOW_DAYS: ${{ vars.DEPLOY_WINDOW_DAYS || 'mon,tue,wed,thu,fri' }}
          DEPLOY_WINDOW_TIMEZONE: ${{ vars.DEPLOY_WINDOW_TIMEZONE || 'Asia/Shanghai' }}
          DEPLOY_WINDOW_EMERGENCY: ${{ github.event.inputs.emergency_override == true && 'true' || '' }}
        run: python scripts/check_deployment_window.py

      - name: Run pytest deployment window tests (STAB-P2-007)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt 2>/dev/null || pip install pytest
          # MAINT-P3-002: --maxfail=1 fail-fast
          python -m pytest tests/test_stab_p2_007_deployment_window.py --maxfail=1 -v --no-cov --tb=short
