name: contract-tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  contract-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Create database schema
        working-directory: backend
        run: |
          python -c "
          import os, sys
          try:
              # Step 1: 测试 psycopg2 导入
              import psycopg2
              print('psycopg2 version:', psycopg2.__version__)

              # Step 2: 测试 Settings 初始化 (会触发 model_validator)
              from app.core.config import settings
              print('Settings OK, app_env:', settings.app_env)

              # Step 3: 测试数据库连接
              from sqlalchemy import create_engine, text
              url = os.environ['DATABASE_URL']
              print('Connecting to:', url)
              engine = create_engine(url)
              with engine.connect() as conn:
                  ver = conn.execute(text('SELECT version()')).scalar()
                  print('DB connection OK:', ver[:60])

              # Step 4: 创建表
              from app.models import Base
              Base.metadata.create_all(engine)
              print('Schema created:', len(Base.metadata.tables), 'tables')
          except Exception as e:
              import traceback as tb
              err = tb.format_exc()
              print(err, file=sys.stderr)
              with open(os.environ.get('GITHUB_STEP_SUMMARY', '/dev/null'), 'a') as f:
                  f.write('## Create database schema FAILED\n\n```\n' + err + '\n```\n')
              sys.exit(1)
          "
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/testdb
      - name: Export OpenAPI schema
        working-directory: backend
        run: python scripts/export_openapi.py
      - name: Run contract tests
        working-directory: backend
        run: |
          pytest tests/contract/ -v --tb=short
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/testdb
      - name: Upload contract test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-test-results
          path: backend/tests/contract/
