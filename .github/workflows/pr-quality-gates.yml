name: PR Quality Gates

on:
  pull_request:
    branches: [main, develop]

jobs:
  sklearn-compat-check:
    name: sklearn & Model Compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run sklearn compatibility check
        working-directory: backend
        run: |
          python scripts/check_compatibility.py --json
        env:
          PYTHONPATH: ${{ github.workspace }}/backend

  # MAINT-P3-003: Lint 门禁 (ruff blocking + bandit blocking + mypy/format non-blocking)
  lint:
    name: Lint (ruff + bandit + mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install ruff>=0.4.0 mypy>=1.9.0 bandit>=1.7.8
      - name: Ruff check (blocking)
        working-directory: backend
        run: ruff check app/
      - name: Ruff format check (non-blocking, tech debt)
        working-directory: backend
        continue-on-error: true
        run: ruff format --check app/
      - name: Bandit security scan (blocking on Medium+)
        working-directory: backend
        run: bandit -r app/ -c pyproject.toml -ll
      - name: Mypy type check (non-blocking, tech debt)
        working-directory: backend
        continue-on-error: true
        run: mypy app/ --no-error-summary

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run unit tests
        working-directory: backend
        run: pytest tests/ -m "unit" -x -v --timeout=120

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/testdb
      - name: Run integration tests
        working-directory: backend
        run: pytest tests/ -m "integration" -x -v --timeout=120
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/testdb

  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/testdb
      - name: Export OpenAPI
        working-directory: backend
        run: python scripts/export_openapi.py
      - name: Run contract tests
        working-directory: backend
        # MAINT-P3-002: --maxfail=1 fail-fast, 第一个失败即停止避免吞掉错误
        run: pytest tests/contract/ --maxfail=1 -v --timeout=120
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/testdb

  coverage-check:
    name: Coverage Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/testdb
      - name: Run coverage
        working-directory: backend
        run: |
          # MAINT-P3-002: --maxfail=1 fail-fast, 第一个失败即停止避免吞掉错误
          # MAINT-P3-001: 覆盖率门禁 40% → 50% 统一 (略高于基线 46.13%, 渐进提升路线图: 50% → 60% → 70% → 85%)
          pytest tests/ -m "unit or integration" \
            --maxfail=1 \
            --cov=app \
            --cov-report=xml \
            --cov-fail-under=50 \
            --timeout=120
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/testdb
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: npm audit (SEC-P3-003)
        working-directory: frontend
        # SEC-P3-003: 前端依赖安全审计, HIGH/CRITICAL 漏洞告警
        # 使用 continue-on-error 避免因 registry 问题或 dev 依赖漏洞阻塞 PR
        # 实际高危漏洞应通过 dependency-scan job (pip-audit/safety) 和 dependabot 处理
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true
      - name: Build for production
        working-directory: frontend
        run: npm run build
      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  frontend-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Run tests
        working-directory: frontend
        run: npm run test:unit

  e2e-smoke:
    name: E2E Smoke (Mocked API)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Playwright
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run E2E smoke tests (mock API)
        working-directory: frontend
        run: npx playwright test --project=chromium-smoke --reporter=list
        env:
          CI: true

  # SEC-A: 依赖项 SCA 扫描 (HIGH/CRITICAL 漏洞阻塞 PR 合并)
  # 仅在依赖文件变更时触发, 避免无依赖变更的 PR 浪费 CI 资源
  dependency-scan:
    name: Dependency SCA Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # 仅在依赖文件变更时运行, 减少无谓扫描
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.changed_files_url, 'requirements.txt') ||
      contains(toJson(github.event.pull_request.files), 'requirements.txt') ||
      contains(toJson(github.event.pull_request.files), 'requirements-dev.txt')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install pip-audit
        run: python -m pip install --upgrade "pip-audit>=2.7.0"
      - name: Scan backend dependencies
        working-directory: backend
        run: |
          # --strict: 任何漏洞都返回非零退出码, 阻塞合并
          pip-audit \
            --requirement requirements.txt \
            --requirement requirements-dev.txt \
            --format json \
            --output pip-audit-report.json \
            --strict
      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: backend/pip-audit-report.json
          retention-days: 30

  # SEC-B: 容器镜像 trivy 扫描 (HIGH/CRITICAL 漏洞阻塞 PR 合并)
  # 仅在 Dockerfile / docker-compose.yml / .trivyignore 变更时触发
  container-scan:
    name: Container Image Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(toJson(github.event.pull_request.files), 'Dockerfile') ||
      contains(toJson(github.event.pull_request.files), 'docker-compose.yml') ||
      contains(toJson(github.event.pull_request.files), '.trivyignore')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        working-directory: backend
        run: docker build -f Dockerfile -t dws-backend:scan .

      - name: Build frontend image
        working-directory: frontend
        run: docker build -f Dockerfile -t dws-frontend:scan .

      - name: Scan backend image with trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: dws-backend:scan
          format: 'sarif'
          output: 'trivy-backend-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          args: --ignorefile backend/.trivyignore

      - name: Scan frontend image with trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: dws-frontend:scan
          format: 'sarif'
          output: 'trivy-frontend-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          args: --ignorefile frontend/.trivyignore

      - name: Upload backend SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend-results.sarif

      - name: Upload frontend SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend-results.sarif

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-reports
          path: |
            trivy-backend-results.sarif
            trivy-frontend-results.sarif
          retention-days: 30

  quality-gate-summary:
    name: Quality Gate Summary
    runs-on: ubuntu-latest
    needs: [sklearn-compat-check, lint, unit-tests, integration-tests, contract-tests, coverage-check, frontend-build, frontend-tests, e2e-smoke, dependency-scan, container-scan]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          echo "## PR Quality Gates Summary" >> $GITHUB_STEP_SUMMARY
          echo "- sklearn Compat: ${{ needs.sklearn-compat-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Lint (ruff+bandit+mypy): ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Unit Tests: ${{ needs.unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Integration Tests: ${{ needs.integration-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Contract Tests: ${{ needs.contract-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Coverage Check: ${{ needs.coverage-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend Build: ${{ needs.frontend-build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend Tests: ${{ needs.frontend-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- E2E Smoke: ${{ needs.e2e-smoke.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dependency SCA: ${{ needs.dependency-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Container Scan: ${{ needs.container-scan.result }}" >> $GITHUB_STEP_SUMMARY

          # dependency-scan 与 container-scan 为条件触发 (skipped 视为通过)
          SCAN_RESULT="${{ needs.dependency-scan.result }}"
          if [ "$SCAN_RESULT" != "success" ] && [ "$SCAN_RESULT" != "skipped" ]; then
            echo "❌ Quality gates failed (dependency-scan)" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          CONTAINER_RESULT="${{ needs.container-scan.result }}"
          if [ "$CONTAINER_RESULT" != "success" ] && [ "$CONTAINER_RESULT" != "skipped" ]; then
            echo "❌ Quality gates failed (container-scan)" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          if [ "${{ needs.sklearn-compat-check.result }}" != "success" ] || \
             [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.unit-tests.result }}" != "success" ] || \
             [ "${{ needs.integration-tests.result }}" != "success" ] || \
             [ "${{ needs.contract-tests.result }}" != "success" ] || \
             [ "${{ needs.coverage-check.result }}" != "success" ] || \
             [ "${{ needs.frontend-build.result }}" != "success" ] || \
             [ "${{ needs.frontend-tests.result }}" != "success" ] || \
             [ "${{ needs.e2e-smoke.result }}" != "success" ]; then
            echo "❌ Quality gates failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "✅ All quality gates passed" >> $GITHUB_STEP_SUMMARY
