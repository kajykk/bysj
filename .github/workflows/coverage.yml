name: Coverage

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-coverage:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Create database schema
        working-directory: backend
        run: python scripts/create_schema_ci.py
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/testdb
      - name: Run tests with coverage
        working-directory: backend
        run: |
          # MAINT-P3-002: --maxfail=1 fail-fast, 第一个失败即停止避免吞掉错误
          # MAINT-P3-001: 覆盖率门禁 60% → 50% 统一 (略高于基线 46.13%, 渐进提升路线图: 50% → 60% → 70% → 85%)
          pytest tests/ -m "not contract" \
            --maxfail=1 \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=50 \
            --tb=short \
            -q 2>&1 | tee /tmp/pytest_output.txt
          exit_code=${PIPESTATUS[0]}
          if [ $exit_code -ne 0 ]; then
            {
              echo "## Backend tests FAILED"
              echo ""
              echo '```'
              tail -150 /tmp/pytest_output.txt
              echo '```'
            } >> $GITHUB_STEP_SUMMARY
            exit $exit_code
          fi
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379/0
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/htmlcov/

  frontend-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Run tests with coverage
        working-directory: frontend
        run: npm run test:coverage
        # MAINT-P3-002: 移除 continue-on-error: true, 测试失败必须阻塞 CI
        # MAINT-P3-001: 覆盖率门禁由 vitest.config.ts thresholds 控制 (50% 起点)
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: frontend/coverage/

  coverage-summary:
    runs-on: ubuntu-latest
    needs: [backend-coverage, frontend-coverage]
    if: always()
    steps:
      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage-report
          path: backend-coverage
      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage-report
          path: frontend-coverage
      - name: Coverage summary
        run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: see artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: see artifacts" >> $GITHUB_STEP_SUMMARY
